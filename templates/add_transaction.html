{% extends "base.html" %}

{% block title %}Add Transaction - Profit Tracker{% endblock %}

{% block content %}
<div class="form-container">
    <h1 class="page-header">Add Transaction</h1>

    <div class="card">
        <form method="POST" action="{{ url_for('add_transaction') }}" class="transaction-form">
            {{ form.csrf_token }}
            
            <!-- Transaction Type -->
            <div class="form-group">
                <label>Transaction Type *</label>
                <div class="type-toggle">
                    <label class="type-option {% if request.form.get('type') != 'expense' %}active{% endif %}">
                        <input type="radio" name="type" value="sale" {% if request.form.get('type') != 'expense' %}checked{% endif %}>
                        <i class="fas fa-arrow-up"></i>
                        <span>Sale</span>
                    </label>
                    <label class="type-option {% if request.form.get('type') == 'expense' %}active{% endif %}">
                        <input type="radio" name="type" value="expense" {% if request.form.get('type') == 'expense' %}checked{% endif %}>
                        <i class="fas fa-arrow-down"></i>
                        <span>Expense</span>
                    </label>
                </div>
            </div>

            <!-- Amount -->
            <div class="form-group">
                <label for="amount">Amount *</label>
                <div class="input-group">
                    <span class="input-prefix">$</span>
                    <input type="number" step="0.01" min="0" id="amount" name="amount" required placeholder="0.00" class="form-control">
                </div>
            </div>

            <!-- Category -->
            <div class="form-group">
                <label for="category_id">Category *</label>
                <select id="category_id" name="category_id" required class="form-control">
                    <option value="">Select a category</option>
                    {% for category in categories %}
                        <option value="{{ category.id }}" {% if request.form.get('category_id')|int == category.id %}selected{% endif %}>{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" placeholder="Optional note about this transaction" class="form-control"></textarea>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" value="{{ today if today else '' }}" class="form-control">
                <small class="form-text">Leave empty for today's date</small>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-success btn-block">
                <i class="fas fa-plus-circle"></i>
                Add Transaction
            </button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Set today's date as default if not set
        const dateInput = document.getElementById('date');
        if (!dateInput.value) {
            dateInput.valueAsDate = new Date();
        }

        // Type toggle styling
        const typeOptions = document.querySelectorAll('.type-option input');
        typeOptions.forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.type-option').forEach(opt => opt.classList.remove('active'));
                this.closest('.type-option').classList.add('active');
            });
        });
    });
</script>
{% endblock %}

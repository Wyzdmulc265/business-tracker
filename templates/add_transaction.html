{% extends "base.html" %}

{% block title %}Add Transaction - Profit Tracker{% endblock %}

{% block content %}
<div class="form-container">
    <h1 class="page-header">Add Transaction</h1>

    <div class="card">
        <form method="POST" action="{{ url_for('add_transaction') }}">
    {{ form.csrf_token }}
            <!-- Transaction Type -->
            <div class="form-group">
                <label>Transaction Type *</label>
                <div class="form-radio-group">
                    <label class="form-radio-label">
                        <input type="radio" name="type" value="sale" checked>
                        💰 Sale
                    </label>
                    <label class="form-radio-label">
                        <input type="radio" name="type" value="expense">
                        💸 Expense
                    </label>
                </div>
            </div>

            <!-- Amount -->
            <div class="form-group">
                <label for="amount">Amount ($) *</label>
                <input type="number" step="0.01" min="0" id="amount" name="amount" required placeholder="0.00">
            </div>

            <!-- Category -->
            <div class="form-group">
                <label for="category_id">Category *</label>
                <select id="category_id" name="category_id" required>
                    <option value="">Select a category</option>
                    {% for category in categories %}
                        <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" placeholder="Optional note about this transaction"></textarea>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" value="{{ today if today else '' }}">
                <small class="form-text">Leave empty for today's date</small>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-success" style="width: 100%;">
                Add Transaction
            </button>
        </form>
    </div>
</div>

<script>
    // Set today's date as default
    document.getElementById('date').valueAsDate = new Date();

    // Update categories based on type selection
    const typeRadios = document.querySelectorAll('input[name="type"]');
    const categorySelect = document.getElementById('category_id');

    typeRadios.forEach(radio => {
        radio.addEventListener('change', function() {
            // This would require page reload or AJAX to dynamically filter
            // For simplicity, we show all categories and user selects appropriate one
        });
    });
</script>
{% endblock %}

{% extends "base.html" %}

{% block title %}Register - Profit Tracker{% endblock %}

{% block content %}
<div class="form-container">
    <h1 class="page-header">Register</h1>

    <div class="card">
        <form method="POST" action="{{ url_for('register') }}">
            {{ form.csrf_token }}
            
            <!-- Username -->
            <div class="form-group">
                <label for="username">Username *</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
            </div>

            <!-- Business Name -->
            <div class="form-group">
                <label for="business_name">Business Name *</label>
                <input type="text" id="business_name" name="business_name" required>
                <small class="form-text">Your business name must be unique</small>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required minlength="6">
                <small class="form-text">Must be at least 6 characters</small>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirm_password">Confirm Password *</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-success" style="width: 100%;">
                Register
            </button>
        </form>
        
        <div class="auth-links">
            <p>Already have an account? <a href="{{ url_for('login') }}" class="text-link">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}

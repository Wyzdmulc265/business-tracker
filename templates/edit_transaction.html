{% extends "base.html" %}

{% block title %}Edit Transaction - Profit Tracker{% endblock %}

{% block content %}
<div class="form-container">
    <h1 class="page-header">Edit Transaction</h1>

    <div class="card">
        <form method="POST" action="{{ url_for('edit_transaction', id=transaction.id) }}">
            <!-- Transaction Type -->
            <div class="form-group">
                <label>Transaction Type *</label>
                <div class="form-radio-group">
                    <label class="form-radio-label">
                        <input type="radio" name="type" value="sale" 
                               {% if transaction.type == 'sale' %}checked{% endif %}>
                        💰 Sale
                    </label>
                    <label class="form-radio-label">
                        <input type="radio" name="type" value="expense"
                               {% if transaction.type == 'expense' %}checked{% endif %}>
                        💸 Expense
                    </label>
                </div>
            </div>

            <!-- Amount -->
            <div class="form-group">
                <label for="amount">Amount ($) *</label>
                <input type="number" step="0.01" min="0" id="amount" name="amount" required 
                       value="{{ transaction.amount }}" placeholder="0.00">
            </div>

            <!-- Category -->
            <div class="form-group">
                <label for="category_id">Category *</label>
                <select id="category_id" name="category_id" required>
                    <option value="">Select a category</option>
                    {% for category in categories %}
                        <option value="{{ category.id }}" 
                                {% if category.id == transaction.category_id %}selected{% endif %}>
                            {{ category.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" 
                          placeholder="Optional note about this transaction">{{ transaction.description or '' }}</textarea>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" 
                       value="{{ transaction.date.strftime('%Y-%m-%d') }}">
                <small class="form-text">Leave empty for today's date</small>
            </div>

            <!-- Submit & Cancel -->
            <div class="form-actions">
                <button type="submit" class="btn btn-success">Update Transaction</button>
                <a href="{{ url_for('history') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

services:
  - type: web
    name: profit-tracker
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: profit-tracker-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: profit-tracker-db
    plan: free
    region: oregon

services:
  - type: web
    name: profit-tracker
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: profit-tracker-db
          property: connectionString
      - key: NODE_ENV
        value: production
    autoDeploy: true
    healthCheckPath: /
    databases:
      - name: profit-tracker-db
        plan: free
        region: oregon